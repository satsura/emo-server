services:
  nginx:
    image: nginx:alpine
    container_name: emo-nginx
    network_mode: "host"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    restart: unless-stopped

  emo-proxy:
    build: ../proxy
    container_name: emo-proxy
    network_mode: "host"
    volumes:
      - ../proxy/emoProxy.conf:/app/emoProxy.conf
      - emo-data:/var/data
      - emo-logs:/var/log
      - /tmp/probe_gtts:/tmp/probe_gtts
      - emo-tmp:/tmp
      - /home/homer/emo-photos:/var/data/photos
      - /home/homer/emo-audio:/home/homer/emo-audio
    restart: unless-stopped

  ai-server:
    build: ../ai-server
    container_name: emo-ai
    network_mode: "host"
    volumes:
      - ../ai-server/server.py:/app/server.py
      - /home/homer/emo-audio:/tmp/emo-audio
    environment:
      - SERVE_HOST=res.living.ai
      - PORT=9090
      - AUDIO_URL_BASE=http://eu1-api.living.ai
      - N8N_WEBHOOK_URL=http://127.0.0.1:5678/webhook/emo
      - RHVOICE_URL=http://127.0.0.1:8088
      - RHVOICE_VOICE=artemiy
      - RHVOICE_RATE=65
    restart: unless-stopped

  rhvoice:
    image: ghcr.io/aculeasis/rhvoice-rest:latest
    container_name: emo-rhvoice
    network_mode: "host"
    environment:
      - RHVOICE_REST_PORT=8088
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: emo-n8n
    network_mode: "host"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://192.168.1.64:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-emo2024}
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped

volumes:
  emo-data:
  emo-logs:
  emo-tmp:
  emo-audio:
  n8n-data:
